spring:
  application:
    name: mcpserver
  datasource:
    url: jdbc:h2:mem:mcpserver;MODE=PostgreSQL;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    driver-class-name: org.h2.Driver
    username: sa
    password:
  h2:
    console:
      enabled: true
      path: /h2-console
  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        format_sql: true
    open-in-view: false
  thymeleaf:
    cache: false
  ai:
    mcp:
      server:
        enabled: true
        protocol: sse
        request-timeout: 20s
        capabilities:
          tool: true
          prompt: true
          resource: true
        sse-endpoint: /mcp/sse
        sse-message-endpoint: /mcp/message
        name: mcpserver
        version: 1.0.0
        instructions: MCP protocol server for Spring AI chat and RAG operations.
    openai:
      api-key: ${OPEN_AI_KEY}
      chat:
        options:
          model: gpt-4o-mini

app:
  mcp:
    enabled: true
  chat:
    # 시스템 프롬프트
    system-prompt: |
      You are a Spring AI assistant.
      Answer only about Spring AI, including its concepts, setup, APIs, patterns, and usage.
      If the user's question is outside Spring AI, say that this chatbot currently focuses on Spring AI topics.
      Please write your answer in Korean.
      Keep the response concise, factual, and suitable for structured UI rendering.
    memory-max-messages: 20
    llm-timeout-ms: 15000
    llm-max-attempts: 3
    llm-retry-base-delay-ms: 300
    llm-retry-max-delay-ms: 2000
    llm-retry-jitter-ms: 100
  rag:
    enabled: true
    document-path: classpath:docs/spring_AI_v1.0.pdf
    vector-store-path: data/vector-store/spring-ai-vector-store.json
    metadata-path: data/vector-store/spring-ai-index-metadata.json
    startup-mode: LOAD_OR_INDEX
    embedding-model-id: sentence-transformers/all-MiniLM-L6-v2
    chunk-size: 800
    min-chunk-size-chars: 350
    min-chunk-length-to-embed: 10
    max-num-chunks: 10000
    keep-separator: true
    top-k: 4
    similarity-threshold: 0.30
